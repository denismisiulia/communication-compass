<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Admin</title>
<!-- No index, no follow — keeps this page out of search engines -->
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2eb; --ink: #1a1814; --ink-light: #6b6560;
  --accent: #c8e63c; --accent-dark: #a8c420;
  --direct: #e63c3c; --card-bg: #ffffff; --border: #d4cfc6;
  --shadow-lg: 0 8px 40px rgba(26,24,20,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* ── LOGIN GATE ── */
#login-gate {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background-image: radial-gradient(circle at 20% 80%, rgba(200,230,60,0.12) 0%, transparent 50%);
}
.gate-card { width: 380px; max-width: 96vw; background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 36px 40px; box-shadow: var(--shadow-lg); }
.gate-logo { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 4px; }
.gate-logo span { color: var(--accent-dark); font-style: italic; }
.gate-sub { font-size: 0.65rem; color: var(--ink-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }
.gate-field { margin-bottom: 14px; }
.gate-field label { display: block; font-size: 0.61rem; color: var(--ink-light); margin-bottom: 5px; letter-spacing: 0.06em; text-transform: uppercase; }
.gate-field input { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.15s; }
.gate-field input:focus { border-color: var(--ink); }
.gate-field input::placeholder { color: var(--ink-light); opacity: 0.45; }
.gate-btn { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.74rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 11px; border-radius: 6px; border: none; background: var(--ink); color: var(--bg); cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.gate-btn:hover { opacity: 0.85; }
.gate-error { font-size: 0.7rem; color: var(--direct); background: #fde8e8; border: 1px solid #f5c6c6; border-radius: 5px; padding: 8px 12px; margin-bottom: 14px; display: none; }
.gate-hint { font-size: 0.61rem; color: var(--ink-light); margin-top: 16px; text-align: center; line-height: 1.6; }

/* ── ADMIN PANEL ── */
#admin-panel { display: none; min-height: 100vh; }
.admin-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 32px; border-bottom: 1.5px solid var(--border); background: var(--card-bg); }
.admin-logo { font-family: 'DM Serif Display', serif; font-size: 1.25rem; }
.admin-logo span { color: var(--accent-dark); font-style: italic; }
.admin-header-actions { display: flex; gap: 8px; }
.btn { font-family: 'DM Mono', monospace; font-size: 0.69rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 14px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; color: var(--ink-light); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--ink); color: var(--ink); }
.btn.danger { border-color: #f5c6c6; color: var(--direct); }
.btn.danger:hover { background: #fde8e8; }
.admin-body { padding: 32px; max-width: 960px; margin: 0 auto; }
.admin-stats { display: flex; gap: 14px; margin-bottom: 32px; flex-wrap: wrap; }
.admin-stat { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 18px 22px; flex: 1; min-width: 130px; }
.admin-stat-num { font-family: 'DM Serif Display', serif; font-size: 2.1rem; line-height: 1; }
.admin-stat-label { font-size: 0.63rem; color: var(--ink-light); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 0.63rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); }
.search-input { font-family: 'DM Mono', monospace; font-size: 0.71rem; padding: 6px 11px; border: 1.5px solid var(--border); border-radius: 4px; background: var(--card-bg); color: var(--ink); outline: none; width: 220px; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--ink); }
.search-input::placeholder { color: var(--ink-light); opacity: 0.5; }
.table-wrap { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.users-table { width: 100%; border-collapse: collapse; }
.users-table th { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); text-align: left; padding: 10px 16px; border-bottom: 1.5px solid var(--border); font-weight: 500; background: var(--bg); }
.users-table td { font-size: 0.73rem; padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.users-table tr:last-child td { border-bottom: none; }
.users-table tbody tr:hover { background: rgba(26,24,20,0.02); }
.badge { display: inline-block; font-size: 0.58rem; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.05em; background: #e8f7e8; color: #2a6e2a; border: 1px solid #b8e0b8; }
.del-btn { font-size: 0.59rem; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: none; color: var(--ink-light); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; }
.del-btn:hover { background: #fde8e8; border-color: var(--direct); color: var(--direct); }
.empty-row td { text-align: center; color: var(--ink-light); font-size: 0.72rem; padding: 32px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── LOGIN GATE ── -->
<div id="login-gate">
  <div class="gate-card">
    <div class="gate-logo">Compass <span>Admin</span></div>
    <div class="gate-sub">Private Access Only</div>
    <div class="gate-error" id="gate-error"></div>
    <div class="gate-field">
      <label>Admin Password</label>
      <input type="password" id="gate-password" placeholder="Enter your admin password" />
    </div>
    <button class="gate-btn" onclick="gateLogin()">Enter →</button>
    <div class="gate-hint">
      This page is not publicly listed.<br>
      Bookmark it after logging in.
    </div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <div class="admin-header">
    <div class="admin-logo">Compass <span>Admin</span></div>
    <div class="admin-header-actions">
      <button class="btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn" onclick="refreshPanel()">↻ Refresh</button>
      <button class="btn danger" onclick="gateLogout()">Sign Out</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="admin-stats">
      <div class="admin-stat"><div class="admin-stat-num" id="stat-total">0</div><div class="admin-stat-label">Total Users</div></div>
      <div class="admin-stat"><div class="admin-stat-num" id="stat-today">0</div><div class="admin-stat-label">Today</div></div>
      <div class="admin-stat"><div class="admin-stat-num" id="stat-week">0</div><div class="admin-stat-label">This Week</div></div>
      <div class="admin-stat"><div class="admin-stat-num" id="stat-companies">0</div><div class="admin-stat-label">Companies</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">Registered Users</div>
      <input class="search-input" id="search-input" placeholder="Search name, email, company…" oninput="renderTable()" />
    </div>
    <div class="table-wrap">
      <table class="users-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Email</th><th>Company</th><th>Registered</th><th></th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── ADMIN PASSWORD ────────────────────────────────────────────────────────────
// The password is stored as a hash — not plain text.
// To change your password:
//   1. Open your browser console (F12)
//   2. Type: hashPassword('YourNewPassword') and press Enter
//   3. Copy the result and replace the value below
const ADMIN_HASH = 'h_1g7k3m2_10'; // Default password: Cr5009880ct
//                  ↑ Replace this entire string with your new hash

function hashPassword(pw) {
  let h=0;
  for(let i=0;i<pw.length;i++) h=Math.imul(31,h)+pw.charCodeAt(i)|0;
  return 'h_'+Math.abs(h).toString(36)+'_'+pw.length;
}

// ── GATE AUTH ─────────────────────────────────────────────────────────────────
function gateLogin() {
  const pw = document.getElementById('gate-password').value;
  if(!pw){ showGateError('Please enter the admin password.'); return; }
  if(hashPassword(pw) !== ADMIN_HASH){ showGateError('Incorrect password.'); return; }
  // Store gate session for this browser tab only (sessionStorage clears on tab close)
  sessionStorage.setItem('cc_admin_gate', '1');
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  refreshPanel();
}

function gateLogout() {
  sessionStorage.removeItem('cc_admin_gate');
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-gate').style.display = 'flex';
  document.getElementById('gate-password').value = '';
}

function showGateError(msg) {
  const el = document.getElementById('gate-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 3000);
}

// Auto-restore session if tab is still open
window.addEventListener('load', () => {
  if(sessionStorage.getItem('cc_admin_gate')==='1') {
    document.getElementById('login-gate').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    refreshPanel();
  }
  document.getElementById('gate-password').addEventListener('keydown', e => {
    if(e.key==='Enter') gateLogin();
  });
});

// ── DATA ──────────────────────────────────────────────────────────────────────
function getUsers() {
  try { return JSON.parse(localStorage.getItem('cc_users')||'[]'); } catch { return []; }
}

function refreshPanel() {
  const users = getUsers();
  const now = new Date();
  const todayStr = now.toDateString();
  const weekAgo = new Date(now - 7*24*60*60*1000);

  document.getElementById('stat-total').textContent = users.length;
  document.getElementById('stat-today').textContent = users.filter(u => new Date(u.registeredAt).toDateString()===todayStr).length;
  document.getElementById('stat-week').textContent  = users.filter(u => new Date(u.registeredAt) >= weekAgo).length;
  document.getElementById('stat-companies').textContent = new Set(users.map(u=>u.company).filter(Boolean)).size;
  renderTable();
}

function renderTable() {
  const query = (document.getElementById('search-input').value||'').toLowerCase();
  let users = getUsers();
  if(query) users = users.filter(u =>
    u.name.toLowerCase().includes(query) ||
    u.email.toLowerCase().includes(query) ||
    (u.company||'').toLowerCase().includes(query)
  );
  users = [...users].reverse(); // newest first

  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';

  if(!users.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">${query ? 'No users match your search.' : 'No users registered yet.'}</td></tr>`;
    return;
  }

  const allUsers = getUsers();
  users.forEach((u, i) => {
    const globalIndex = allUsers.length - allUsers.findIndex(x=>x.email===u.email);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--ink-light);font-size:0.65rem">${globalIndex}</td>
      <td><strong style="font-weight:500">${escHtml(u.name)}</strong></td>
      <td style="color:var(--ink-light)">${escHtml(u.email)}</td>
      <td>${escHtml(u.company||'—')}</td>
      <td style="color:var(--ink-light);font-size:0.68rem;white-space:nowrap">${formatDate(u.registeredAt)}</td>
      <td><button class="del-btn" onclick="deleteUser('${escHtml(u.email)}')">Remove</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function deleteUser(email) {
  if(!confirm(`Remove ${email}?\nThis will delete their account. They will need to re-register.`)) return;
  const users = getUsers().filter(u => u.email.toLowerCase()!==email.toLowerCase());
  localStorage.setItem('cc_users', JSON.stringify(users));
  refreshPanel();
}

function exportCSV() {
  const users = getUsers();
  if(!users.length){ alert('No users to export yet.'); return; }
  const rows = [
    ['#','Name','Email','Company','Registered'],
    ...users.map((u,i) => [i+1, u.name, u.email, u.company||'', formatDate(u.registeredAt)])
  ].map(row => row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(rows.join('\n'));
  link.download = `compass-users-${dateStamp()}.csv`;
  link.click();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dateStamp(){ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
</script>
</body>
</html>
